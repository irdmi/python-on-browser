<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyOnline – Python в браузере</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Зависимости (CDN) -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
</head>
<body>
    <!-- Индикатор загрузки Pyodide -->
    <div id="loader">Загрузка Python…</div>

    <!-- Панель редактора -->
    <div id="editor-panel">
        <div id="editor-header">
            <button id="run-btn">▶ Запустить</button>
            <button id="share-btn">🔗 Share output</button>
            <span style="font-size:12px; color:#666;">Ctrl+Enter</span>
        </div>
        <textarea id="code" spellcheck="false">
print("Hello, PyOnline!")
print("Сумма:", sum(range(10)))

# Визуальный вывод
display("<h2 style='color:blue'>Это HTML!</h2>")
display("<svg width='100' height='100'><circle cx='50' cy='50' r='40' fill='orange'/></svg>")

# Работа с загруженным файлом (если есть)
import os
print("Файлы в рабочей папке:", os.listdir('.'))
        </textarea>
        <!-- Блок загрузки файлов -->
        <div id="file-upload-section">
            <label for="file-input" class="upload-label">📁 Загрузить файлы</label>
            <input type="file" id="file-input" multiple>
            <button id="clear-files-btn">🗑 Очистить</button>
            <div id="file-list"></div>
        </div>
    </div>

    <!-- Панель вывода -->
    <div id="output-panel">
        <div class="tabs">
            <div class="tab active" data-tab="console">Console</div>
            <div class="tab" data-tab="visual">Visual</div>
            <button id="edit-btn" style="margin-left:auto; background:#555;" onclick="exitViewMode()">✏️ Редактировать</button>
        </div>
        <div id="console" class="tab-content active"></div>
        <div id="visual" class="tab-content"></div>
        <div id="stats">
            <div class="stat-item"><span class="stat-label">⏱ Время:</span><span class="stat-value" id="time">0 мс</span></div>
            <div class="stat-item"><span class="stat-label">📝 Символов:</span><span class="stat-value" id="chars">0</span></div>
            <div class="stat-item"><span class="stat-label">📏 Строк:</span><span class="stat-value" id="lines">0</span></div>
            <div class="stat-item"><span class="stat-label">🖼 display вызовов:</span><span class="stat-value" id="displays">0</span></div>
            <div class="stat-item"><span class="stat-label">📌 Статус:</span><span class="stat-value" id="status">—</span></div>
        </div>
    </div>

    <!-- Скрипты приложения (порядок важен) -->
    <script src="js/fileManager.js"></script>
    <script src="js/runner.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
